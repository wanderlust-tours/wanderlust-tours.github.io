<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanderlust Tours — Experience the Divine</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
:root{--saffron:#FF6B1A;--saffron2:#FF8C00;--gold:#D4A017;--gold2:#F5C842;--maroon:#7B1818;--deep-maroon:#3D0C0C;--cream:#FFF8EE;--warm-white:#FFFDF8;--dark:#1A0A00;--wa:#25D366;}
body{font-family:'Poppins',sans-serif;background:var(--warm-white);color:var(--dark);overflow-x:hidden;}
#loader{position:fixed;inset:0;z-index:9999;background:var(--deep-maroon);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity 0.7s ease;}
.loader-emblem{width:90px;height:90px;border:3px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.8rem;animation:loaderSpin 2s linear infinite;}
@keyframes loaderSpin{to{transform:rotate(360deg)}}
.loader-name{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:700;color:var(--gold2);letter-spacing:4px;}
.loader-tagline{color:rgba(255,255,255,0.4);font-size:0.7rem;letter-spacing:4px;text-transform:uppercase;}
.l-bar{width:200px;height:2px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;}
.l-fill{height:100%;background:linear-gradient(90deg,var(--maroon),var(--saffron),var(--gold));animation:lfill 2s ease forwards;}
@keyframes lfill{from{width:0}to{width:100%}}
header{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(61,12,12,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,160,23,0.3);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;}
.logo{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:var(--gold2);letter-spacing:2px;}
.logo span{color:var(--saffron);}
.nav-links{display:flex;gap:1.4rem;list-style:none;}
.nav-links a{font-size:0.78rem;font-weight:500;text-decoration:none;color:rgba(255,255,255,0.8);}
.nav-links a:hover{color:var(--gold2);}
.h-right{display:flex;align-items:center;gap:0.6rem;}
.h-wa{background:var(--wa);color:white;padding:0.48rem 1.1rem;border-radius:50px;font-size:0.78rem;font-weight:700;text-decoration:none;}
.hbg{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;}
.hbg span{display:block;width:22px;height:2px;background:var(--gold2);border-radius:2px;}
.mob-menu{display:none;flex-direction:column;gap:1rem;position:fixed;top:64px;left:0;right:0;z-index:999;background:var(--deep-maroon);padding:1.2rem 1.4rem;border-bottom:1px solid rgba(212,160,23,0.2);}
.mob-menu.open{display:flex;}
.mob-menu a{font-size:1rem;font-weight:500;color:rgba(255,255,255,0.85);text-decoration:none;}
#home{min-height:100svh;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;text-align:center;padding:5rem 1.4rem 3rem;background:var(--deep-maroon);}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(123,24,24,0.8) 0%,rgba(61,12,12,0.95) 70%);}
.hero-inner{position:relative;z-index:3;max-width:700px;margin:0 auto;}
.hero-logo-circle{width:120px;height:120px;border-radius:50%;border:3px solid var(--gold);background:radial-gradient(circle at 35% 35%,rgba(255,140,0,0.25),rgba(123,24,24,0.85));display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.5rem;box-shadow:0 0 0 6px rgba(212,160,23,0.15),0 0 40px rgba(212,160,23,0.35);}
.hero-badge{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(212,160,23,0.12);border:1px solid rgba(212,160,23,0.3);color:var(--gold2);padding:0.4rem 1.2rem;border-radius:50px;font-size:0.7rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:1.2rem;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--saffron);animation:livePulse 1.5s ease-in-out infinite;}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,26,0.5);}50%{box-shadow:0 0 0 8px rgba(255,107,26,0);}}
.hero-title{font-family:'Cinzel',serif;font-size:clamp(2.8rem,11vw,5.5rem);font-weight:900;color:white;line-height:1.05;margin-bottom:0.3rem;letter-spacing:2px;}
.hero-title .g{background:linear-gradient(90deg,var(--gold2),var(--saffron),var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero-tagline{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3.5vw,1.7rem);color:rgba(255,248,238,0.9);font-style:italic;margin:0.5rem 0 1rem;}
.hero-sub{font-size:0.9rem;color:rgba(255,255,255,0.6);max-width:440px;margin:0 auto 1.5rem;line-height:1.8;}
.hero-pills{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem;}
.hero-pill{background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.25);color:rgba(255,248,238,0.85);padding:0.3rem 0.9rem;border-radius:50px;font-size:0.68rem;}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
.btn-saffron{background:linear-gradient(135deg,var(--saffron),var(--maroon));color:white;padding:0.95rem 2.4rem;border-radius:50px;text-decoration:none;font-size:0.95rem;font-weight:700;box-shadow:0 6px 28px rgba(255,107,26,0.45);transition:transform 0.2s;}
.btn-saffron:hover{transform:translateY(-3px);}
.btn-gold{background:rgba(212,160,23,0.12);color:var(--gold2);border:2px solid rgba(212,160,23,0.45);padding:0.95rem 2.4rem;border-radius:50px;text-decoration:none;font-size:0.95rem;font-weight:600;transition:all 0.2s;}
.btn-gold:hover{background:rgba(212,160,23,0.22);}
.marquee-wrap{background:var(--maroon);padding:1rem 0;overflow:hidden;border-top:1px solid rgba(212,160,23,0.3);border-bottom:1px solid rgba(212,160,23,0.3);}
.marquee-track{display:flex;gap:1.5rem;white-space:nowrap;animation:mscroll 22s linear infinite;}
.marquee-track span{font-size:0.75rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:0 0.5rem;}
.marquee-track .hi{color:var(--gold2);font-family:'Cinzel',serif;}
.marquee-track .dot{color:rgba(212,160,23,0.3);}
@keyframes mscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.sec{padding:5rem 1.4rem;}
.sec-cream{background:var(--cream);}
.sec-dark{background:var(--deep-maroon);color:white;}
.sh{text-align:center;margin-bottom:2.5rem;}
.sl{font-family:'Cinzel',serif;font-size:0.65rem;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--saffron);margin-bottom:0.5rem;}
.sec-dark .sl{color:var(--gold2);}
.st{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5.5vw,3rem);font-weight:700;line-height:1.1;margin-bottom:0.7rem;color:var(--deep-maroon);}
.sec-dark .st{color:var(--gold2);}
.sd{color:#6b4c3b;font-size:0.92rem;max-width:480px;margin:0 auto;line-height:1.75;}
.sec-dark .sd{color:rgba(255,248,238,0.6);}
.why-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;max-width:600px;margin:0 auto;}
.why-card{background:white;border-radius:16px;padding:1.5rem 1rem;text-align:center;border:1px solid rgba(212,160,23,0.15);box-shadow:0 4px 20px rgba(212,160,23,0.08);}
.why-icon{font-size:2rem;margin-bottom:0.6rem;}
.why-card h3{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--maroon);margin-bottom:0.3rem;}
.why-card p{font-size:0.78rem;color:#6b4c3b;}
.pkg-grid{display:grid;grid-template-columns:1fr;gap:1.5rem;}
.card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(212,160,23,0.12);border:1px solid rgba(212,160,23,0.1);transition:transform 0.3s,box-shadow 0.3s;opacity:0;transform:translateY(30px);}
.card.show{opacity:1;transform:translateY(0);transition:opacity 0.5s ease,transform 0.5s ease;}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(212,160,23,0.22);}
.card-img{position:relative;height:200px;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
.card:hover .card-img img{transform:scale(1.05);}
.card-badge{position:absolute;top:1rem;left:1rem;padding:0.3rem 0.8rem;border-radius:50px;font-size:0.7rem;font-weight:700;color:white;}
.card-fav{position:absolute;top:1rem;right:1rem;font-size:1.2rem;cursor:pointer;background:rgba(255,255,255,0.9);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.card-body{padding:1.4rem;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;margin-bottom:0.3rem;color:var(--deep-maroon);}
.card-loc{font-size:0.78rem;color:#6b4c3b;margin-bottom:0.8rem;}
.card-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.8rem;}
.ctag{background:rgba(212,160,23,0.1);color:var(--maroon);padding:0.2rem 0.6rem;border-radius:20px;font-size:0.68rem;font-weight:500;}
.notice{font-size:0.72rem;font-weight:600;margin:0.3rem 0 0.7rem;padding:0.3rem 0.7rem;border-radius:8px;display:inline-block;}
.notice.warn{color:#c1440e;background:rgba(255,107,26,0.09);}
.notice.ok{color:#1b7c3e;background:rgba(27,124,62,0.09);}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.card-price{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--maroon);}
.card-price small{font-size:0.65rem;color:#6b4c3b;font-family:'Poppins',sans-serif;}
.card-dur{font-size:0.78rem;font-weight:600;color:var(--saffron);background:rgba(255,107,26,0.08);padding:0.3rem 0.7rem;border-radius:20px;}
.book-btn{width:100%;background:linear-gradient(135deg,var(--maroon),var(--saffron));color:white;border:none;padding:0.85rem;border-radius:50px;font-family:'Poppins',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
.book-btn:hover{opacity:0.9;transform:translateY(-1px);}
.how-grid{display:grid;grid-template-columns:1fr;gap:1.2rem;}
.how-card{background:rgba(212,160,23,0.06);border:1px solid rgba(212,160,23,0.15);border-radius:16px;padding:1.4rem;display:flex;align-items:flex-start;gap:1rem;}
.how-num{width:42px;height:42px;min-width:42px;border-radius:50%;background:linear-gradient(135deg,var(--maroon),var(--saffron));color:white;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:1rem;font-weight:700;}
.how-card h3{font-size:0.95rem;font-weight:700;color:var(--gold2);margin-bottom:0.3rem;font-family:'Cinzel',serif;}
.how-card p{font-size:0.8rem;color:rgba(255,248,238,0.6);line-height:1.5;}
.wa-big{display:inline-flex;align-items:center;gap:0.7rem;background:var(--wa);color:white;padding:1rem 2.5rem;border-radius:50px;text-decoration:none;font-weight:700;font-size:1rem;box-shadow:0 6px 28px rgba(37,211,102,0.4);transition:transform 0.2s;margin-top:2.5rem;}
.wa-big:hover{transform:translateY(-3px);}
.rev-grid{display:grid;grid-template-columns:1fr;gap:1.2rem;margin-bottom:2rem;}
.rev-card{background:white;border-radius:16px;padding:1.5rem;border:1px solid rgba(212,160,23,0.15);box-shadow:0 4px 20px rgba(212,160,23,0.08);}
.rev-stars{color:var(--gold);font-size:1.1rem;margin-bottom:0.6rem;}
.rev-text{font-size:0.88rem;color:#3d1a00;line-height:1.6;margin-bottom:1rem;font-style:italic;}
.rev-author{display:flex;align-items:center;gap:0.8rem;}
.rev-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--maroon),var(--saffron));color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;}
.rev-name{font-weight:700;font-size:0.88rem;color:var(--deep-maroon);}
.rev-trip{font-size:0.72rem;color:#6b4c3b;}
#no-reviews{text-align:center;color:#6b4c3b;font-style:italic;padding:2rem;}
.fb-wrap{background:white;border-radius:24px;padding:2rem;border:1px solid rgba(212,160,23,0.15);box-shadow:0 8px 40px rgba(212,160,23,0.12);max-width:520px;margin:0 auto;}
.fb-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--deep-maroon);margin-bottom:1.4rem;}
.fg{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.fg label{font-size:0.78rem;font-weight:600;color:var(--maroon);}
.fg input,.fg select,.fg textarea{border:2px solid rgba(212,160,23,0.2);border-radius:12px;padding:0.78rem 1rem;font-family:'Poppins',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;background:var(--cream);}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
.star-row{display:flex;flex-direction:row-reverse;gap:0.3rem;}
.star-row input{display:none;}
.star-row label{font-size:1.6rem;color:#ddd;cursor:pointer;transition:color 0.15s;}
.star-row input:checked ~ label,.star-row label:hover,.star-row label:hover ~ label{color:var(--gold);}
.fb-submit{width:100%;background:linear-gradient(135deg,var(--maroon),var(--saffron));color:white;border:none;padding:0.95rem;border-radius:50px;font-family:'Poppins',sans-serif;font-size:0.97rem;font-weight:700;cursor:pointer;margin-top:0.5rem;}
.fb-done{display:none;text-align:center;background:rgba(212,160,23,0.1);color:var(--maroon);font-weight:700;padding:1rem;border-radius:12px;margin-top:1rem;}
.fberror{display:none;color:#c1440e;font-size:0.8rem;margin-top:0.5rem;font-weight:600;}
.cc-grid{display:grid;grid-template-columns:1fr;gap:1rem;margin-bottom:3rem;}
.cc{background:rgba(212,160,23,0.06);border:1px solid rgba(212,160,23,0.15);border-radius:16px;padding:1.15rem 1.5rem;display:flex;align-items:center;gap:1rem;text-decoration:none;color:var(--gold2);transition:background 0.2s,transform 0.2s;}
.cc:hover{background:rgba(212,160,23,0.12);transform:translateX(5px);}
.cc-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.cc h4{font-size:0.68rem;opacity:0.5;font-weight:400;margin-bottom:0.1rem;}
.cc p{font-size:0.9rem;font-weight:600;color:white;}
.ftr{border-top:1px solid rgba(212,160,23,0.15);padding-top:2.5rem;text-align:center;}
.ftr-logo{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:700;color:var(--gold2);}
.ftr-logo span{color:var(--saffron);}
.ftr-copy{color:rgba(255,248,238,0.18);font-size:0.7rem;padding:1rem 0;}
.float-wa{position:fixed;bottom:1.5rem;right:1.5rem;z-index:990;width:60px;height:60px;border-radius:50%;background:var(--wa);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 26px rgba(37,211,102,0.55);text-decoration:none;animation:wapulse 2.5s ease-in-out infinite;}
.float-wa svg{width:28px;height:28px;fill:white;}
@keyframes wapulse{0%,100%{box-shadow:0 6px 26px rgba(37,211,102,0.55);}50%{box-shadow:0 6px 40px rgba(37,211,102,0.92);}}
#topBtn{position:fixed;bottom:1.5rem;left:1.5rem;z-index:990;width:48px;height:48px;border-radius:50%;background:var(--maroon);color:var(--gold2);border:1px solid rgba(212,160,23,0.3);font-size:1.1rem;cursor:pointer;opacity:0;transition:opacity 0.3s;display:flex;align-items:center;justify-content:center;}
#topBtn.show{opacity:1;}
#bookingBox{display:none;position:fixed;inset:0;z-index:2000;background:rgba(61,12,12,0.75);backdrop-filter:blur(6px);justify-content:center;align-items:center;padding:1rem;}
#bookingBox.open{display:flex;}
.popup-inner{background:white;border-radius:24px;padding:2rem;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.4);animation:popIn 0.3s ease;}
@keyframes popIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
.popup-icon{font-size:2.5rem;text-align:center;margin-bottom:0.5rem;}
.popup-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;text-align:center;color:var(--deep-maroon);margin-bottom:0.3rem;}
.popup-price{text-align:center;font-size:1.4rem;font-weight:700;color:var(--maroon);font-family:'Cinzel',serif;margin-bottom:1.2rem;}
.popup-input{width:100%;padding:0.82rem 1rem;border:2px solid rgba(212,160,23,0.2);border-radius:12px;font-family:'Poppins',sans-serif;font-size:0.9rem;outline:none;margin-bottom:0.8rem;background:var(--cream);}
.popup-wa{display:flex;align-items:center;justify-content:center;gap:0.6rem;background:var(--wa);color:white;width:100%;padding:0.9rem;border-radius:50px;border:none;font-family:'Poppins',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;margin-bottom:0.6rem;}
.popup-cancel{display:block;width:100%;padding:0.75rem;background:var(--cream);color:#6b4c3b;border:1px solid rgba(212,160,23,0.2);border-radius:50px;font-family:'Poppins',sans-serif;font-size:0.88rem;cursor:pointer;}
@media(max-width:620px){.nav-links{display:none;}.hbg{display:flex;}}
@media(min-width:600px){.pkg-grid{grid-template-columns:repeat(2,1fr);}.rev-grid{grid-template-columns:repeat(2,1fr);}.how-grid{grid-template-columns:repeat(2,1fr);}.cc-grid{grid-template-columns:repeat(2,1fr);}.why-grid{grid-template-columns:repeat(4,1fr);}}
</style>
</head>
